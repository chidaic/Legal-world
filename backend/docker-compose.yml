services:
  postgres:
    image: postgres:16
    container_name: simlaw-town-postgres
    env_file:
      - ../.env
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  backend:
    build:
      context: ..
      dockerfile: backend/Dockerfile
      args:
        UV_INDEX_URL: ${UV_INDEX_URL:-https://pypi.org/simple}
    container_name: simlaw-town-backend
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ../.env
    environment:
      SIMLAW_PLAYER_LAWYER_MODE: ${SIMLAW_PLAYER_LAWYER_MODE:-}
      SIMLAW_PLAYER_LAWYER_TIMEOUT_SECONDS: ${SIMLAW_PLAYER_LAWYER_TIMEOUT_SECONDS:-86400}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ../.env:/app/.env
      - ./sandbox_data:/app/backend/sandbox_data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS http://127.0.0.1:8000/api/status >/dev/null",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped

volumes:
  postgres_data:
